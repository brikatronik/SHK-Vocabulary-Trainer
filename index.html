<!DOCTYPE html>
<html>
<head>
    <title>SHK Vocabulary Trainer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="card">

        <h1 id="question">
            Wird geladen...
        </h1>

        <div id="answer" class="hidden">
            <h2 id="germanWord"></h2>
            <img
                id="pageImage"
                class="hidden"
                alt="SHK page image">
            <p id="description"></p>
        </div>

    <div class="bottom-section">

        <!-- Answer button -->
        <div id="mainButtons">

            <button id="showButton">
                Antwort anzeigen
            </button>

        </div>

        <!-- Voting buttons -->
        <div class="rating-buttons hidden">

            <button id="easyButton">
                Kenne ich
            </button>

            <button id="hardButton">
                Fast
            </button>

            <button id="againButton">
                Keine Ahnung
            </button>

        </div>

        <!-- Counters -->
        <div id="stats">

            <p>
                Bekannt:
                <span id="easyCount">0</span>
            </p>

            <p>
                Fast:
                <span id="hardCount">0</span>
            </p>

            <p>
                Keine Ahnung:
                <span id="againCount">0</span>
            </p>

        </div>

        <div id="sessionContainer">

            <p>
                Heutige Sitzung:
                <span id="sessionCount">
                    0
                </span>
                Karten studiert
            </p>

            <div id="progressBarOuter">
                <div id="progressBarInner"></div>
            </div>

        </div>

    </div>

    </div>

    <script src="script.js"></script>

</body>
</html>
